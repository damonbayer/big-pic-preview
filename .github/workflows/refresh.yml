name: Refresh results data

on:
  schedule:
    # Box Office Mojo posts the prior day's actual domestic gross in the late
    # morning Pacific; this runs in the early afternoon Pacific to catch the
    # settled number.
    - cron: '0 14 * * *'
      timezone: 'America/Los_Angeles'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Fetch results
        run: uv run scripts/fetch_results.py

      - name: Commit if data changed
        id: commit
        # results.csv now holds only meaningful data (no fetched_at timestamp), so
        # any change to a tracked file is a real result change worth committing.
        run: |
          git add games/*/results.csv
          if git diff --cached --quiet; then
            echo "No data changes; skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Refresh box office and Metacritic results"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger site deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}

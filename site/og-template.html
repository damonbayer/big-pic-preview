<!doctype html>
<!--
  Source for public/og.png (the 1200x630 social-share card) and, scaled down,
  the look shared with the site hero. This file is NOT served — Astro only ships
  public/ and src/pages/ — it lives here as the regeneration source.

  Regenerate after a branding change (it mirrors the hero in Scoreboard.astro):

    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless=new --disable-gpu --hide-scrollbars --force-device-scale-factor=1 \
      --window-size=1200,630 --virtual-time-budget=4000 \
      --screenshot=site/public/og.png "file://$PWD/site/og-template.html"

  Headless Chrome loads the real Google Fonts; --virtual-time-budget gives them
  time to fetch before the screenshot fires.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Archivo:wght@400;600;700;900&family=Yellowtail&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #137a49;
        --ink: #142838;
        --cream: #f4efe1;
        --gold: #f2c94c;
      }
      * {
        box-sizing: border-box;
        margin: 0;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
      }
      body {
        font-family: 'Archivo', system-ui, sans-serif;
        color: var(--cream);
        background: radial-gradient(1100px 520px at 50% 46%, rgba(255, 255, 255, 0.13), transparent 70%), var(--green);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .filmstrip {
        position: absolute;
        left: 0;
        right: 0;
        height: 30px;
        background:
          repeating-linear-gradient(90deg, transparent 0 14px, rgba(244, 239, 225, 0.85) 14px 26px, transparent 26px 40px),
          var(--ink);
        background-clip: content-box, border-box;
        padding: 8px 0;
        opacity: 0.92;
      }
      .filmstrip.top {
        top: 0;
      }
      .filmstrip.bottom {
        bottom: 0;
      }
      .kicker {
        color: var(--cream);
        opacity: 0.85;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 1.05rem;
        margin-bottom: 6px;
      }
      h1 {
        line-height: 0.95;
      }
      .script {
        display: block;
        font-family: 'Yellowtail', cursive;
        font-size: 3.4rem;
        color: var(--gold);
        transform: rotate(-4deg);
        text-shadow: 2px 2px 0 var(--ink);
        margin-bottom: -0.18em;
      }
      .slab {
        font-family: 'Alfa Slab One', serif;
        font-size: 6.8rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      .big {
        color: var(--cream);
        text-shadow:
          3px 3px 0 var(--ink),
          6px 6px 0 rgba(10, 25, 35, 0.35);
      }
      .picture {
        color: var(--gold);
        text-shadow:
          3px 3px 0 var(--ink),
          6px 6px 0 rgba(10, 25, 35, 0.35);
      }
      .event {
        margin-top: 22px;
        color: var(--cream);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.35em;
        font-size: 1.5rem;
      }
      .projector {
        width: 120px;
        margin-top: 24px;
        filter: drop-shadow(0 6px 0 rgba(10, 25, 35, 0.25));
      }
    </style>
  </head>
  <body>
    <div class="filmstrip top"></div>
    <p class="kicker">An unofficial scoreboard for The Ringer&rsquo;s</p>
    <h1>
      <span class="script">The</span>
      <span class="slab"><span class="big">Big</span> <span class="picture">Picture</span></span>
    </h1>
    <p class="event">Summer Movie Preview</p>
    <svg class="projector" viewBox="0 0 200 110" aria-hidden="true">
      <g fill="#142838">
        <circle cx="62" cy="38" r="34"></circle>
        <circle cx="138" cy="38" r="34"></circle>
        <rect x="42" y="64" width="116" height="34" rx="6"></rect>
        <polygon points="158,72 186,64 186,98 158,90"></polygon>
        <rect x="20" y="76" width="26" height="14" rx="4"></rect>
      </g>
      <g fill="#f2c94c">
        <circle cx="62" cy="24" r="6.5"></circle><circle cx="62" cy="52" r="6.5"></circle>
        <circle cx="48" cy="38" r="6.5"></circle><circle cx="76" cy="38" r="6.5"></circle>
        <circle cx="138" cy="24" r="6.5"></circle><circle cx="138" cy="52" r="6.5"></circle>
        <circle cx="124" cy="38" r="6.5"></circle><circle cx="152" cy="38" r="6.5"></circle>
      </g>
      <rect x="52" y="74" width="58" height="6" rx="3" fill="#137a49"></rect>
    </svg>
    <div class="filmstrip bottom"></div>
  </body>
</html>

default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.9.1
    hooks:
      - id: prettier
        name: prettier (yaml)
        files: \.ya?ml$
      - id: prettier
        name: prettier (astro/typescript)
        entry: >-
          node -e "const cp=require('node:child_process'),path=require('node:path');const cmd=process.platform==='win32'?'where':'which';const prettier=cp.execFileSync(cmd,['prettier'],{encoding:'utf8'}).trim().split(/\r?\n/)[0];const plugin=path.resolve(path.dirname(prettier),'../lib/node_modules/prettier-plugin-astro/dist/index.js');const r=cp.spawnSync(prettier,['--write','--ignore-unknown','--plugin='+plugin,...process.argv.slice(1)],{stdio:'inherit'});process.exit(r.status??1);"
        files: ^site/.*\.(astro|tsx?)$
        additional_dependencies:
          - prettier@3.6.2
          - prettier-plugin-astro@0.14.1
